<!DOCTYPE html>
<html>
<head>

  <link rel="stylesheet" href="css/style.css">

  </ul>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<header>

  <input type="search" id="searchBox" placeholder="Search laws...">
</header>

<div class="categories">
