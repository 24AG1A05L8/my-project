<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Constitution of India</title>
<link rel="icon" href="image/india_icon.png">
<style>
  /* Full-page background */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    color: #fff;
    position: relative;
    overflow: auto;
    background: url('images/law-1.jfif') no-repeat center center fixed;
    background-size: cover; /* Zoom to fill */
  }

  /* Navbar styling */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background-color: rgba(255, 255, 255, 0.1); /* very light transparent */
    position: relative;
    z-index: 1;
    backdrop-filter: blur(5px);
  }

  .navbar .logo {
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    text-shadow: 1px 1px 4px #000;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
  }

  .nav-links a {
    text-decoration: none;
    color: #fff;
    font-weight: 500;
    transition: color 0.3s, transform 0.2s;
  }

  .nav-links a:hover {
    color: #ff9800;
    transform: scale(1.05);
  }

  /* Header */
  header {
    text-align: center;
    margin-top: 80px;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-size: 48px;
    text-shadow: 2px 2px 10px #000;
    letter-spacing: 1px;
  }

  /* Login box */
  .login-box {
    max-width: 400px;
    margin: 50px auto 100px auto;
    padding: 40px 30px;
    background-color: rgba(255, 255, 255, 0.15); /* transparent bright background */
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px); /* makes login readable */
    position: relative;
    z-index: 1;
    animation: fadeIn 1s ease-in-out;
  }

  .login-box h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #ffeb3b; /* bright color */
    font-size: 28px;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 3px #000;
  }

  .login-box input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    background-color: rgba(255,255,255,0.2);
    color: #fff;
  }

  .login-box input::placeholder {
    color: #fff;
  }

  .login-box input:focus {
    border: 2px solid #ffeb3b;
    background-color: rgba(255,255,255,0.3);
  }

  .login-box button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff9800, #ffc107);
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .login-box button:hover {
    background: linear-gradient(90deg, #e68900, #ffb300);
    transform: scale(1.05);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 15px;
    background-color: rgba(255,255,255,0.1);
    position: relative;
    z-index: 1;
    font-size: 14px;
    color: #fff;
    text-shadow: 1px 1px 3px #000;
    backdrop-filter: blur(5px);
  }

  /* Fade-in animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px);}
    to { opacity: 1; transform: translateY(0);}
  }

  /* Responsive adjustments */
  @media (max-width: 500px) {
    header h1 { font-size: 32px; }
    .login-box { padding: 30px 20px; margin: 30px auto 80px auto; }
    .login-box h2 { font-size: 24px; }
  }
</style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🇮🇳 Law Portal</div>
  <ul class="nav-links">
    <li><a href="page3.html">Home</a></li>
    <li><a href="women.html">Women</a></li>
    <li><a href="child.html">Child</a></li>
    <li><a href="student.html">Student</a></li>
    <li><a href="traffic.html">Traffic</a></li>
    <li><a href="admin.html">Admin</a></li>
  </ul>
</nav>

<!-- HEADER -->
<header>
  <h1>Welcome to Constitution of India</h1>
</header>

<!-- LOGIN BOX -->
<section class="login-box">
  <h2>Enter Your Details</h2>
  <form id="loginForm">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="phone" placeholder="Phone" required>
    <button type="submit">Enter</button>
  </form>
</section>

<!-- FOOTER -->
<footer>
  <p>&copy; Government of India</p>
  <span id="datetime"></span>
</footer>

<script>
  // Display current date and time
  const datetime = document.getElementById('datetime');
  setInterval(() => {
    const now = new Date();
    datetime.textContent = now.toLocaleString();
  }, 1000);

  // Handle form submission
  const loginForm = document.getElementById('loginForm');
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    alert("Welcome " + loginForm.name.value + "!");
    loginForm.reset();
  });
</script>
</body>
</html>
